name: GYG Sync Workflow

on:
  # schedule:
  #   - cron: '17 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests python-dotenv pyotp
          playwright install chromium

      - name: Run GYG Scraper
        env:
          HEADLESS_MODE: 'true'
          MAX_PAGES: ${{ secrets.MAX_PAGES || vars.MAX_PAGES || '100' }}
          GYG_EMAIL: ${{ secrets.GYG_EMAIL }}
          GYG_PASSWORD: ${{ secrets.GYG_PASSWORD }}
          GYG_2FA_SECRET: ${{ secrets.GYG_2FA_SECRET }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_MIRROR_BASE_ID: ${{ secrets.AIRTABLE_MIRROR_BASE_ID || vars.AIRTABLE_MIRROR_BASE_ID }}
          AIRTABLE_TABLE: ${{ secrets.AIRTABLE_TABLE || vars.AIRTABLE_TABLE || 'Tito Sunny' }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          python gyg_unified.py --once

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.json browser_profile/ || true
          if ! git diff-index --quiet HEAD --; then
            git commit -m "chore: update cache and state files [skip ci]"
          else
            echo "No changes to commit"
          fi
          git pull --rebase --autostash origin main
          git push origin main
